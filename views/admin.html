<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance — Admin Dashboard</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--muted:#94a3b8;--txt:#e2e8f0;--acc:#38bdf8;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--border:#334155;}
  *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  body{margin:0;background:var(--bg);color:var(--txt);}
  header{padding:16px 22px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  header h1{font-size:18px;margin:0;}
  .tabs{display:flex;gap:8px;}
  .tab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--txt);cursor:pointer;font-size:14px;}
  .tab.active{background:var(--acc);color:#04263a;border-color:var(--acc);font-weight:600;}
  .right{margin-left:auto;display:flex;gap:10px;}
  main{max-width:1080px;margin:0 auto;padding:24px 18px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px;}
  h2{font-size:15px;margin:0 0 14px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;}
  tr.absent td{opacity:.6;}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .pill.start{background:rgba(34,197,94,.15);color:#86efac;}
  .pill.end{background:rgba(245,158,11,.15);color:#fcd34d;}
  .pill.complete{background:rgba(34,197,94,.15);color:#86efac;}
  .pill.partial{background:rgba(245,158,11,.15);color:#fcd34d;}
  .pill.absent{background:rgba(239,68,68,.15);color:#fca5a5;}
  .tag{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:5px;font-size:10px;background:rgba(148,163,184,.18);color:#cbd5e1;}
  .missing{color:#64748b;}
  .thumb{width:56px;height:42px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:#000;}
  .thumb.ph{display:inline-block;color:#475569;font-size:10px;text-align:center;line-height:42px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  input,textarea{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:#0b1424;color:var(--txt);font-size:14px;}
  input.search{max-width:220px;}
  .ghost{padding:9px 14px;border:1px solid var(--border);background:transparent;color:var(--txt);border-radius:9px;cursor:pointer;font-size:13px;text-decoration:none;display:inline-block;}
  .btn{padding:10px 16px;border:none;border-radius:9px;background:var(--acc);color:#04263a;font-weight:600;cursor:pointer;font-size:14px;}
  .empty{text-align:center;color:var(--muted);padding:34px 10px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .row label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .msg{font-size:13px;color:var(--muted);margin-top:8px;min-height:18px;}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px;}
  .summary{font-size:13px;color:var(--muted);margin-bottom:12px;}
</style>
</head>
<body>
<header>
  <h1>🗂️ Admin</h1>
  <div class="tabs">
    <button class="tab active" data-view="attendance">Attendance</button>
    <button class="tab" data-view="employees">Employees</button>
  </div>
  <div class="right">
    <a class="ghost" href="/">Check-in page</a>
    <button class="ghost" id="logoutBtn">Log out</button>
  </div>
</header>

<main>
  <!-- ATTENDANCE (by date) -->
  <section id="attendanceView">
    <div class="card">
      <div class="toolbar">
        <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Date</label>
          <input type="date" id="date"></div>
        <input class="search" id="search" placeholder="Filter by name or ID…" style="align-self:flex-end;">
        <button class="ghost" id="refreshBtn" style="align-self:flex-end;">Refresh</button>
        <a class="ghost" href="/api/export" style="align-self:flex-end;">Export CSV (all)</a>
        <button class="ghost" id="clearBtn" style="align-self:flex-end;">Clear all records</button>
      </div>
      <div class="summary" id="summary"></div>
      <div id="dayTable"><div class="empty">Loading…</div></div>
    </div>
  </section>

  <!-- EMPLOYEES (roster) -->
  <section id="employeesView" style="display:none;">
    <div class="card">
      <h2>Add employee</h2>
      <div class="row">
        <div><label>Employee ID</label><input id="empIdIn" placeholder="EMP1042"></div>
        <div><label>Name</label><input id="empNameIn" placeholder="Priya Kumar"></div>
        <button class="btn" id="addEmpBtn">Add</button>
      </div>
      <div class="msg" id="addMsg"></div>
    </div>
    <div class="card">
      <h2>Bulk import</h2>
      <p style="font-size:13px;color:var(--muted);margin:0 0 8px;">One employee per line as <code>Name, EmployeeID</code> (comma or tab separated). A header row like <code>Name,ID</code> is ignored.</p>
      <textarea id="bulkText" rows="5" style="width:100%;" placeholder="Priya Kumar, EMP1042&#10;Arun Raj, EMP1043"></textarea>
      <div style="margin-top:10px;"><button class="btn" id="bulkBtn">Import</button></div>
      <div class="msg" id="bulkMsg"></div>
    </div>
    <div class="card">
      <h2>Roster (<span id="empCount">0</span>)</h2>
      <div id="empTable"><div class="empty">Loading…</div></div>
    </div>
  </section>
</main>

<div class="lightbox" id="lightbox"><img id="lightimg" alt="attendance photo"></div>

<script>
const $ = id => document.getElementById(id);
function toLogin(){ window.location.href='/admin/login'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
async function api(path, opts){
  const res=await fetch(path, opts);
  if(res.status===401){ toLogin(); throw new Error('unauth'); }
  return res;
}

// ---- tabs ----
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const v=t.dataset.view;
    $('attendanceView').style.display=v==='attendance'?'':'none';
    $('employeesView').style.display=v==='employees'?'':'none';
    if(v==='attendance') loadDay(); else loadEmployees();
  };
});

// ---- attendance by date ----
let DAY=[];
function todayStr(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
$('date').value=todayStr();
$('date').onchange=loadDay;
$('refreshBtn').onclick=loadDay;
$('search').oninput=renderDay;

async function loadDay(){
  try{ DAY=await (await api('/api/day/'+$('date').value)).json(); }
  catch(e){ if(e.message!=='unauth') DAY=[]; }
  renderDay();
}
function renderDay(){
  const q=$('search').value.trim().toLowerCase();
  let rows=DAY;
  if(q) rows=rows.filter(r=>r.name.toLowerCase().includes(q)||r.empId.toLowerCase().includes(q));
  const present=DAY.filter(r=>r.status!=='absent').length;
  const absent=DAY.filter(r=>r.status==='absent').length;
  $('summary').textContent=`${DAY.length} employees · ${present} checked in · ${absent} absent`;
  const el=$('dayTable');
  if(!rows.length){ el.innerHTML='<div class="empty">No employees or records for this date. Add employees under the Employees tab.</div>'; return; }
  let html='<table><thead><tr><th>Name</th><th>Employee ID</th><th>Status</th><th>Start</th><th>End</th><th>Worked</th><th>Start photo</th><th>End photo</th></tr></thead><tbody>';
  for(const r of rows){
    const st=r.status==='complete'?'<span class="pill complete">present</span>':
             r.status==='partial'?'<span class="pill partial">partial</span>':
             '<span class="pill absent">absent</span>';
    const tag=r.inRoster?'':'<span class="tag">walk-in</span>';
    const start=r.start?`<span class="pill start">${esc(r.start.time)}</span>`:'<span class="missing">—</span>';
    const end=r.end?`<span class="pill end">${esc(r.end.time)}</span>`:'<span class="missing">—</span>';
    const worked=r.worked?`<b>${esc(r.worked)}</b>`:'<span class="missing">—</span>';
    html+=`<tr class="${r.status==='absent'?'absent':''}"><td>${esc(r.name)}${tag}</td><td>${esc(r.empId)}</td><td>${st}</td><td>${start}</td><td>${end}</td><td>${worked}</td><td>${thumb(r.start)}</td><td>${thumb(r.end)}</td></tr>`;
  }
  html+='</tbody></table>';
  el.innerHTML=html;
  el.querySelectorAll('img.thumb').forEach(im=>im.onclick=()=>{ $('lightimg').src=im.dataset.full; $('lightbox').style.display='flex'; });
}
function thumb(r){
  if(!r||!r.photo) return '<span class="thumb ph">—</span>';
  const u='/api/photo/'+encodeURIComponent(r.photo);
  return `<img class="thumb" src="${u}" data-full="${u}" alt="photo">`;
}
$('lightbox').onclick=()=>{ $('lightbox').style.display='none'; };
$('clearBtn').onclick=async()=>{
  if(!confirm('Delete ALL attendance records and their photos? This cannot be undone.')) return;
  try{ await api('/api/records',{method:'DELETE'}); loadDay(); }catch(e){}
};

// ---- employees ----
$('addEmpBtn').onclick=async()=>{
  const empId=$('empIdIn').value.trim(), name=$('empNameIn').value.trim();
  if(!empId||!name){ $('addMsg').textContent='Enter both name and employee ID.'; return; }
  try{
    const res=await api('/api/employees',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,empId})});
    const d=await res.json();
    if(res.ok){ $('addMsg').textContent='Saved. Roster has '+d.count+' employees.'; $('empIdIn').value=''; $('empNameIn').value=''; loadEmployees(); }
    else $('addMsg').textContent=d.error||'Could not save.';
  }catch(e){}
};
$('bulkBtn').onclick=async()=>{
  const text=$('bulkText').value;
  if(!text.trim()){ $('bulkMsg').textContent='Paste some lines first.'; return; }
  try{
    const res=await api('/api/employees/bulk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const d=await res.json();
    $('bulkMsg').textContent=`Added ${d.added}, updated ${d.updated}, skipped ${d.skipped}. Roster now ${d.count}.`;
    $('bulkText').value=''; loadEmployees();
  }catch(e){}
};
async function loadEmployees(){
  let list=[];
  try{ list=await (await api('/api/employees')).json(); }catch(e){ return; }
  $('empCount').textContent=list.length;
  const el=$('empTable');
  if(!list.length){ el.innerHTML='<div class="empty">No employees yet. Add one above.</div>'; return; }
  let html='<table><thead><tr><th>Name</th><th>Employee ID</th><th></th></tr></thead><tbody>';
  for(const e of list){
    html+=`<tr><td>${esc(e.name)}</td><td>${esc(e.empId)}</td><td style="text-align:right;"><button class="ghost" data-id="${esc(e.empId)}">Remove</button></td></tr>`;
  }
  html+='</tbody></table>';
  el.innerHTML=html;
  el.querySelectorAll('button[data-id]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Remove '+b.dataset.id+' from the roster? (Their past attendance records are kept.)')) return;
    try{ await api('/api/employees/'+encodeURIComponent(b.dataset.id),{method:'DELETE'}); loadEmployees(); }catch(e){}
  });
}

// ---- logout ----
$('logoutBtn').onclick=async()=>{ try{ await fetch('/api/admin/logout',{method:'POST'}); }catch(e){} toLogin(); };

loadDay();
</script>
</body>
</html>
